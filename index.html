<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    <title>Document</title>

<body>
    <div class="bg-[#2B2B2B] text-[#fff]">
        <!-- headr -->
         <div class="lg:max-w-7xl md:max-w-2xl max-w-2xs flex justify-between m-auto items-center py-6  ">
            <div>
                <img class="lg:w-50 md:w-40 w-30" src="./img/Logo.png" alt="">

            <div class="lg:flex gap-4 lg:block md:hidden  hidden ">

                </div>

                    </div>
                    <div>

                    </div>
                    <div>

                    </div>
                </div>
            </div>
